<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos Tripla - Visualização Pública</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  /* ── TEMA CLARO — PALETA TRIPLA ── */
  :root {
    /* Brand Colors */
    --brand-space-cadet: #152454;
    --brand-tang-blue:   #0357D5;
    --brand-celestial:   #00A0FF;
    --brand-vivid-sky:   #38DBFF;

    /* Light Theme */
    --bg: #f0f5ff; 
    --surface: #ffffff; 
    --surface2: #e8f0fe;
    --border: #c7d7f5; 
    --text: #0d1a3a; 
    --muted: #4a6080;
    --accent: #0357D5; 
    --accent-hover: #152454; 
    --accent-glow: rgba(3,87,213,0.18);
    --accent-light: #00A0FF; 
    --accent-highlight: #38DBFF;
    --green: #059669; 
    --amber: #d97706; 
    --red: #dc2626; 
    --purple: #7c3aed; 
    --pink: #db2777; 
    --teal: #0d9488;
    --c-comercial: #0357D5; 
    --c-interno: #059669; 
    --c-feriado: #d97706;
    --radius: 16px; 
    --radius-sm: 10px;
    --shadow-sm: 0 1px 3px rgba(3,87,213,0.08); 
    --shadow: 0 4px 12px rgba(3,87,213,0.10), 0 2px 4px rgba(21,36,84,0.06); 
    --shadow-lg: 0 10px 30px rgba(21,36,84,0.14), 0 4px 8px rgba(3,87,213,0.08);
    --font-heading: 'Plus Jakarta Sans', sans-serif; 
    --font-body: 'Inter', sans-serif;
  }

  [data-theme="dark"] {
    --bg: #080e1f; 
    --surface: #0f1a35; 
    --surface2: #152454;
    --border: rgba(56,219,255,0.12); 
    --text: #e8f2ff; 
    --muted: #7fa8d4;
    --accent: #00A0FF; 
    --accent-hover: #38DBFF; 
    --accent-glow: rgba(0,160,255,0.20);
    --accent-light: #38DBFF; 
    --accent-highlight: #38DBFF;
    --green: #10b981; 
    --amber: #f59e0b; 
    --red: #ef4444; 
    --purple: #8b5cf6; 
    --pink: #ec4899; 
    --teal: #14b8a6;
    --c-comercial: #00A0FF; 
    --c-interno: #10b981; 
    --c-feriado: #f59e0b;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.4); 
    --shadow: 0 4px 12px rgba(0,0,0,0.5), 0 2px 6px rgba(0,160,255,0.08); 
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.7), 0 4px 12px rgba(0,160,255,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { 
    font-family: var(--font-body); 
    background: var(--bg); 
    color: var(--text); 
    min-height: 100vh; 
    line-height: 1.6; 
    transition: 0.3s; 
  }
  h1, h2, h3, h4, .view-title, .logo { font-family: var(--font-heading); }
  .hide { display: none !important; }

  /* ── LOADING SCREEN ── */
  #loading-screen {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: linear-gradient(135deg, #080e1f 0%, #152454 45%, #0357D5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
  }
  .loading-logo {
    font-size: 2.5rem;
    font-weight: 800;
    color: #fff;
    font-family: var(--font-heading);
    animation: pulse 2s ease-in-out infinite;
  }
  .loading-logo span {
    background: linear-gradient(90deg, #00A0FF, #38DBFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .loading-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #38DBFF;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── HEADER ── */
  header { 
    position: sticky; 
    top: 0; 
    z-index: 100; 
    background: rgba(255, 255, 255, 0.9); 
    backdrop-filter: blur(16px); 
    -webkit-backdrop-filter: blur(16px); 
    border-bottom: 1px solid var(--border); 
    padding: 0 32px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    height: 72px; 
    box-shadow: 0 1px 12px rgba(3,87,213,0.10); 
    transition: background-color 0.3s; 
  }
  [data-theme="dark"] header { 
    background: rgba(8, 14, 31, 0.88); 
    border-bottom-color: rgba(56,219,255,0.12); 
    box-shadow: 0 1px 12px rgba(0,0,0,0.5); 
  }
  .logo { 
    font-size: 1.4rem; 
    font-weight: 800; 
    letter-spacing: -0.02em; 
    color: var(--text); 
  }
  .logo span { 
    background: linear-gradient(90deg, #0357D5, #00A0FF); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
    background-clip: text; 
  }
  [data-theme="dark"] .logo span { 
    background: linear-gradient(90deg, #00A0FF, #38DBFF); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
    background-clip: text; 
  }
  .header-right { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
  }
  .btn-icon { 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    color: var(--text); 
    padding: 8px 14px; 
    border-radius: var(--radius-sm); 
    cursor: pointer; 
    font-size: 0.85rem; 
    font-weight: 600; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    transition: all 0.2s ease-out;
  }
  .btn-icon:hover { 
    background: var(--border); 
    transform: translateY(-1px); 
  }
  .btn-icon.active { 
    background: var(--accent); 
    color: #fff; 
    border-color: var(--accent); 
  }
  .lucide { 
    width: 1.1em; 
    height: 1.1em; 
    stroke-width: 2.2; 
    flex-shrink: 0; 
  }

  /* ── LAYOUT & SIDEBAR ── */
  .app { display: flex; min-height: calc(100vh - 72px); }
  .sidebar { 
    width: 320px; 
    flex-shrink: 0; 
    background: var(--surface); 
    border-right: 1px solid var(--border); 
    padding: 32px 24px; 
    display: flex; 
    flex-direction: column; 
    gap: 32px; 
    position: sticky; 
    top: 72px; 
    height: calc(100vh - 72px); 
    overflow-y: auto; 
  }
  .sidebar-section h3 { 
    font-size: 0.7rem; 
    font-weight: 700; 
    color: var(--muted); 
    padding: 0 8px; 
    margin-bottom: 12px; 
    text-transform: uppercase; 
    letter-spacing: 0.1em;
  }
  .main { 
    flex: 1; 
    min-width: 0; 
    padding: 40px; 
  }

  /* ── SEARCH BAR ── */
  .search-bar {
    position: relative;
    margin-bottom: 16px;
  }
  .search-input {
    width: 100%;
    padding: 12px 40px 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    transition: 0.2s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .search-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* ── FILTERS ── */
  .filter-group { 
    display: flex; 
    flex-direction: column; 
    gap: 4px; 
  }
  .filter-btn { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    padding: 10px 12px; 
    border-radius: var(--radius-sm); 
    cursor: pointer; 
    border: none; 
    background: transparent; 
    color: var(--muted); 
    font-size: 0.85rem; 
    font-weight: 600; 
    width: 100%; 
    text-align: left; 
    transition: all 0.2s ease; 
  }
  .filter-btn:hover, .filter-btn.active { 
    background: var(--surface2); 
    color: var(--text); 
  }
  .filter-btn.active { 
    font-weight: 700; 
    box-shadow: inset 3px 0 0 var(--accent); 
  }
  .filter-dot { 
    width: 10px; 
    height: 10px; 
    border-radius: 50%; 
    flex-shrink: 0; 
  }
  .filter-count { 
    margin-left: auto; 
    font-size: 0.72rem; 
    background: rgba(128,128,128,0.15); 
    padding: 2px 8px; 
    border-radius: 20px; 
    font-weight: 700; 
    color: var(--text); 
  }

  /* ── DATE RANGE PICKER ── */
  .date-range {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .date-input {
    flex: 1;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    transition: 0.2s;
  }
  .date-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* ── VIEW TABS ── */
  .view-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 0;
  }
  .view-tab {
    padding: 12px 24px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    transition: 0.2s;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }
  .view-tab:hover {
    color: var(--text);
  }
  .view-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── STATS CARDS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    transition: 0.2s;
  }
  .stat-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-2px);
  }
  .stat-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .stat-value {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
    font-family: var(--font-heading);
  }
  .stat-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }

  /* ── TIMELINE VIEW ── */
  .timeline-container {
    max-width: 1000px;
    margin: 0 auto;
  }
  .timeline {
    position: relative;
    padding: 20px 0;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--border);
    transform: translateX(-50%);
  }
  .timeline-item {
    position: relative;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
  }
  .timeline-item:nth-child(odd) {
    flex-direction: row-reverse;
  }
  .timeline-content {
    width: calc(50% - 40px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    transition: 0.3s;
  }
  .timeline-content:hover {
    box-shadow: var(--shadow-lg);
    transform: scale(1.02);
  }
  .timeline-dot {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 4px solid var(--surface);
    box-shadow: 0 0 0 4px var(--border);
    z-index: 2;
  }
  .timeline-date {
    position: absolute;
    left: 50%;
    transform: translateX(-50%) translateY(-45px);
    background: var(--surface2);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    box-shadow: var(--shadow-sm);
  }

  /* ── CALENDAR VIEW ── */
  .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .calendar-nav {
    display: flex;
    gap: 12px;
  }
  .calendar-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .calendar-nav button:hover {
    background: var(--surface2);
  }
  .calendar-title {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text);
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .calendar-day-header {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    padding: 12px 0;
  }
  .calendar-day {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px;
    cursor: pointer;
    transition: 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .calendar-day:hover {
    background: var(--surface2);
    box-shadow: var(--shadow);
  }
  .calendar-day.other-month {
    opacity: 0.3;
  }
  .calendar-day.today {
    border: 2px solid var(--accent);
    background: var(--accent-glow);
  }
  .calendar-day-number {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .calendar-event-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 2px;
  }

  /* ── LIST VIEW ── */
  .event-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    transition: 0.2s;
    display: flex;
    gap: 20px;
  }
  .event-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-2px);
  }
  .event-date-badge {
    flex-shrink: 0;
    width: 80px;
    height: 80px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--border);
  }
  .event-date-day {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }
  .event-date-month {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
  }
  .event-content {
    flex: 1;
  }
  .event-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .event-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .event-tipo-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .event-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .event-meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .event-description {
    margin-top: 12px;
    color: var(--text);
    font-size: 0.9rem;
    line-height: 1.6;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
  }
  .empty-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    color: var(--muted);
    opacity: 0.5;
  }
  .empty-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-text {
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 1024px) {
    .sidebar {
      width: 280px;
    }
    .timeline::before {
      left: 30px;
    }
    .timeline-item {
      flex-direction: row !important;
    }
    .timeline-content {
      width: calc(100% - 80px);
      margin-left: 60px;
    }
    .timeline-dot {
      left: 30px;
    }
    .timeline-date {
      left: 30px;
    }
  }

  @media (max-width: 768px) {
    .app {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      height: auto;
      position: relative;
      top: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .main {
      padding: 24px;
    }
    header {
      padding: 0 16px;
      height: 64px;
    }
    .stats-grid {
      grid-template-columns: 1fr;
    }
    .calendar-grid {
      gap: 4px;
    }
    .event-card {
      flex-direction: column;
      gap: 16px;
    }
    .event-date-badge {
      width: 100%;
      height: 60px;
      flex-direction: row;
      gap: 12px;
    }
  }

  /* ── COLOR HELPERS ── */
  .tipo-comercial { background: var(--c-comercial); color: white; }
  .tipo-interno { background: var(--c-interno); color: white; }
  .tipo-feriado { background: var(--c-feriado); color: white; }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-logo">Eventos <span>Tripla</span></div>
  <div class="loading-spinner"></div>
</div>

<!-- Header -->
<header>
  <div class="logo">Eventos <span>Tripla</span></div>
  <div class="header-right">
    <button class="btn-icon" id="btn-theme" onclick="toggleTheme()">
      <i data-lucide="moon"></i>
      Tema
    </button>
  </div>
</header>

<!-- Main App -->
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Search -->
    <div class="sidebar-section">
      <h3>Buscar</h3>
      <div class="search-bar">
        <input 
          type="text" 
          class="search-input" 
          id="search-input" 
          placeholder="Buscar eventos..."
          oninput="filterEvents()"
        >
        <i data-lucide="search" class="search-icon"></i>
      </div>
    </div>

    <!-- Date Range -->
    <div class="sidebar-section">
      <h3>Período</h3>
      <div class="date-range">
        <input type="date" class="date-input" id="date-from" onchange="filterEvents()">
        <input type="date" class="date-input" id="date-to" onchange="filterEvents()">
      </div>
    </div>

    <!-- Tipo Filter -->
    <div class="sidebar-section">
      <h3>Tipo de Evento</h3>
      <div class="filter-group" id="tipo-filters">
        <button class="filter-btn active" data-tipo="all">
          <span class="filter-dot" style="background: #999;"></span>
          Todos
          <span class="filter-count" id="count-all">0</span>
        </button>
        <button class="filter-btn" data-tipo="Comercial">
          <span class="filter-dot" style="background: var(--c-comercial);"></span>
          Comercial
          <span class="filter-count" id="count-comercial">0</span>
        </button>
        <button class="filter-btn" data-tipo="Interno">
          <span class="filter-dot" style="background: var(--c-interno);"></span>
          Interno
          <span class="filter-count" id="count-interno">0</span>
        </button>
        <button class="filter-btn" data-tipo="Feriado">
          <span class="filter-dot" style="background: var(--c-feriado);"></span>
          Feriado
          <span class="filter-count" id="count-feriado">0</span>
        </button>
      </div>
    </div>

    <!-- Status Filter -->
    <div class="sidebar-section">
      <h3>Status</h3>
      <div class="filter-group" id="status-filters">
        <button class="filter-btn active" data-status="all">
          <span class="filter-dot" style="background: #999;"></span>
          Todos
          <span class="filter-count" id="count-status-all">0</span>
        </button>
        <button class="filter-btn" data-status="Confirmado">
          <span class="filter-dot" style="background: var(--green);"></span>
          Confirmado
          <span class="filter-count" id="count-confirmado">0</span>
        </button>
        <button class="filter-btn" data-status="Provisório">
          <span class="filter-dot" style="background: var(--amber);"></span>
          Provisório
          <span class="filter-count" id="count-provisorio">0</span>
        </button>
        <button class="filter-btn" data-status="Cancelado">
          <span class="filter-dot" style="background: var(--red);"></span>
          Cancelado
          <span class="filter-count" id="count-cancelado">0</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(3,87,213,0.1); color: var(--accent);">
          <i data-lucide="calendar"></i>
        </div>
        <div class="stat-label">Total de Eventos</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(5,150,105,0.1); color: var(--green);">
          <i data-lucide="check-circle"></i>
        </div>
        <div class="stat-label">Confirmados</div>
        <div class="stat-value" id="stat-confirmado">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(217,119,6,0.1); color: var(--amber);">
          <i data-lucide="clock"></i>
        </div>
        <div class="stat-label">Provisórios</div>
        <div class="stat-value" id="stat-provisorio">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: rgba(124,58,237,0.1); color: var(--purple);">
          <i data-lucide="map-pin"></i>
        </div>
        <div class="stat-label">Cidades</div>
        <div class="stat-value" id="stat-cidades">0</div>
      </div>
    </div>

    <!-- View Tabs -->
    <div class="view-tabs">
      <button class="view-tab active" onclick="switchView('timeline')">
        <i data-lucide="git-branch"></i> Timeline
      </button>
      <button class="view-tab" onclick="switchView('calendar')">
        <i data-lucide="calendar-days"></i> Calendário
      </button>
      <button class="view-tab" onclick="switchView('list')">
        <i data-lucide="list"></i> Lista
      </button>
    </div>

    <!-- Timeline View -->
    <div id="view-timeline" class="view-content">
      <div class="timeline-container">
        <div class="timeline" id="timeline"></div>
      </div>
    </div>

    <!-- Calendar View -->
    <div id="view-calendar" class="view-content hide">
      <div class="calendar-header">
        <div class="calendar-nav">
          <button onclick="changeMonth(-1)">
            <i data-lucide="chevron-left"></i> Anterior
          </button>
          <button onclick="changeMonth(1)">
            Próximo <i data-lucide="chevron-right"></i>
          </button>
        </div>
        <div class="calendar-title" id="calendar-title"></div>
        <button class="btn-icon" onclick="goToToday()">
          <i data-lucide="calendar"></i> Hoje
        </button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <!-- List View -->
    <div id="view-list" class="view-content hide">
      <div class="event-list" id="event-list"></div>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state hide">
      <i data-lucide="calendar-x" class="empty-icon"></i>
      <div class="empty-title">Nenhum evento encontrado</div>
      <div class="empty-text">Tente ajustar os filtros ou buscar por outro termo</div>
    </div>
  </main>
</div>

<script src="js/firebase-config.js"></script>
<script>
// ── FIREBASE CONFIGURAÇÕES (VERSÃO COMPAT PARA RODAR LOCALMENTE) ──

  // INICIALIZAÇÃO DO FIREBASE E FIRESTORE (Adicione estas duas linhas)
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── GLOBAL STATE ──
  let EVENTOS = [];
  let filteredEvents = [];
let currentView = 'timeline';
let currentMonth = new Date();
let filters = {
  search: '',
  tipo: 'all',
  status: 'all',
  dateFrom: '',
  dateTo: ''
};

// ── THEME TOGGLE ──
function toggleTheme() {
  const html = document.documentElement;
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  lucide.createIcons();
}

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);

// ── LOAD EVENTOS ──
async function loadEventos() {
  try {
    const snapshot = await db.collection('eventos').orderBy('data_inicio', 'asc').get();
    EVENTOS = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));
    
    filteredEvents = [...EVENTOS];
    updateStats();
    updateCounts();
    renderCurrentView();
    
    // Hide loading screen
    document.getElementById('loading-screen').classList.add('hide');
  } catch (error) {
    console.error('Erro ao carregar eventos:', error);
    document.getElementById('loading-screen').classList.add('hide');
  }
}

// ── UPDATE STATS ──
function updateStats() {
  const total = filteredEvents.length;
  const confirmados = filteredEvents.filter(e => e.status === 'Confirmado').length;
  const provisorios = filteredEvents.filter(e => e.status === 'Provisório').length;
  const cidades = new Set(filteredEvents.map(e => e.cidade).filter(Boolean)).size;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-confirmado').textContent = confirmados;
  document.getElementById('stat-provisorio').textContent = provisorios;
  document.getElementById('stat-cidades').textContent = cidades;
}

// ── UPDATE FILTER COUNTS ──
function updateCounts() {
  // Tipo counts
  document.getElementById('count-all').textContent = EVENTOS.length;
  document.getElementById('count-comercial').textContent = 
    EVENTOS.filter(e => e.tipo === 'Comercial').length;
  document.getElementById('count-interno').textContent = 
    EVENTOS.filter(e => e.tipo === 'Interno').length;
  document.getElementById('count-feriado').textContent = 
    EVENTOS.filter(e => e.tipo === 'Feriado').length;

  // Status counts
  document.getElementById('count-status-all').textContent = EVENTOS.length;
  document.getElementById('count-confirmado').textContent = 
    EVENTOS.filter(e => e.status === 'Confirmado').length;
  document.getElementById('count-provisorio').textContent = 
    EVENTOS.filter(e => e.status === 'Provisório').length;
  document.getElementById('count-cancelado').textContent = 
    EVENTOS.filter(e => e.status === 'Cancelado').length;
}

// ── FILTER EVENTS ──
function filterEvents() {
  filters.search = document.getElementById('search-input').value.toLowerCase();
  filters.dateFrom = document.getElementById('date-from').value;
  filters.dateTo = document.getElementById('date-to').value;

  filteredEvents = EVENTOS.filter(evento => {
    // Search filter
    if (filters.search) {
      const searchText = `${evento.titulo} ${evento.cliente} ${evento.cidade} ${evento.local}`.toLowerCase();
      if (!searchText.includes(filters.search)) return false;
    }

    // Tipo filter
    if (filters.tipo !== 'all' && evento.tipo !== filters.tipo) return false;

    // Status filter
    if (filters.status !== 'all' && evento.status !== filters.status) return false;

    // Date range filter
    if (filters.dateFrom) {
      const eventoDate = evento.data_inicio?.toDate ? evento.data_inicio.toDate() : new Date(evento.data_inicio);
      const fromDate = new Date(filters.dateFrom);
      if (eventoDate < fromDate) return false;
    }
    if (filters.dateTo) {
      const eventoDate = evento.data_inicio?.toDate ? evento.data_inicio.toDate() : new Date(evento.data_inicio);
      const toDate = new Date(filters.dateTo);
      toDate.setHours(23, 59, 59);
      if (eventoDate > toDate) return false;
    }

    return true;
  });

  updateStats();
  renderCurrentView();
}

// ── TIPO FILTER HANDLERS ──
document.querySelectorAll('#tipo-filters .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#tipo-filters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filters.tipo = btn.dataset.tipo;
    filterEvents();
  });
});

// ── STATUS FILTER HANDLERS ──
document.querySelectorAll('#status-filters .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#status-filters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filters.status = btn.dataset.status;
    filterEvents();
  });
});

// ── VIEW SWITCHING ──
function switchView(view) {
  currentView = view;
  
  // Update tabs
  document.querySelectorAll('.view-tab').forEach(tab => tab.classList.remove('active'));
  event.target.closest('.view-tab').classList.add('active');
  
  // Update views
  document.querySelectorAll('.view-content').forEach(v => v.classList.add('hide'));
  document.getElementById(`view-${view}`).classList.remove('hide');
  
  renderCurrentView();
}

function renderCurrentView() {
  const isEmpty = filteredEvents.length === 0;
  document.getElementById('empty-state').classList.toggle('hide', !isEmpty);

  if (!isEmpty) {
    switch(currentView) {
      case 'timeline':
        renderTimeline();
        break;
      case 'calendar':
        renderCalendar();
        break;
      case 'list':
        renderList();
        break;
    }
  }
  
  lucide.createIcons();
}

// ── RENDER TIMELINE ──
function renderTimeline() {
  const container = document.getElementById('timeline');
  if (filteredEvents.length === 0) return;

  let html = '';
  filteredEvents.forEach((evento, index) => {
    const date = evento.data_inicio?.toDate ? evento.data_inicio.toDate() : new Date(evento.data_inicio);
    const dateStr = date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    const tipoClass = `tipo-${evento.tipo?.toLowerCase() || 'comercial'}`;
    const color = evento.tipo === 'Comercial' ? 'var(--c-comercial)' : 
                  evento.tipo === 'Interno' ? 'var(--c-interno)' : 'var(--c-feriado)';

    html += `
      <div class="timeline-item">
        <div class="timeline-dot" style="background: ${color};"></div>
        <div class="timeline-date">${dateStr}</div>
        <div class="timeline-content">
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
            <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--text);">${evento.titulo}</h3>
            <span class="event-tipo-badge ${tipoClass}">${evento.tipo || 'Comercial'}</span>
          </div>
          ${evento.cliente ? `<div style="font-size: 0.85rem; color: var(--muted); margin-bottom: 8px;">
            <i data-lucide="building-2" style="width: 14px; height: 14px;"></i> ${evento.cliente}
          </div>` : ''}
          ${evento.local ? `<div style="font-size: 0.85rem; color: var(--muted); margin-bottom: 8px;">
            <i data-lucide="map-pin" style="width: 14px; height: 14px;"></i> ${evento.local}, ${evento.cidade || ''}
          </div>` : ''}
          ${evento.descricao ? `<p style="margin-top: 12px; color: var(--text); font-size: 0.9rem; line-height: 1.6;">${evento.descricao}</p>` : ''}
          ${evento.publico_esperado ? `<div style="margin-top: 12px; font-size: 0.85rem; color: var(--muted);">
            <i data-lucide="users" style="width: 14px; height: 14px;"></i> ${evento.publico_esperado} pessoas
          </div>` : ''}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

// ── RENDER CALENDAR ──
function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  // Update title
  const monthName = currentMonth.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  document.getElementById('calendar-title').textContent = 
    monthName.charAt(0).toUpperCase() + monthName.slice(1);

  // Calendar grid
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - startDate.getDay());

  const grid = document.getElementById('calendar-grid');
  let html = '';

  // Day headers
  const dayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
  dayNames.forEach(day => {
    html += `<div class="calendar-day-header">${day}</div>`;
  });

  // Calendar days
  const currentDate = new Date(startDate);
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  for (let i = 0; i < 42; i++) {
    const isOtherMonth = currentDate.getMonth() !== month;
    const isToday = currentDate.getTime() === today.getTime();
    
    const dayEvents = filteredEvents.filter(evento => {
      const eventoDate = evento.data_inicio?.toDate ? evento.data_inicio.toDate() : new Date(evento.data_inicio);
      eventoDate.setHours(0, 0, 0, 0);
      return eventoDate.getTime() === currentDate.getTime();
    });

    const classes = ['calendar-day'];
    if (isOtherMonth) classes.push('other-month');
    if (isToday) classes.push('today');

    html += `
      <div class="${classes.join(' ')}">
        <div class="calendar-day-number">${currentDate.getDate()}</div>
        ${dayEvents.map(e => {
          const color = e.tipo === 'Comercial' ? 'var(--c-comercial)' : 
                       e.tipo === 'Interno' ? 'var(--c-interno)' : 'var(--c-feriado)';
          return `<div class="calendar-event-dot" style="background: ${color};" title="${e.titulo}"></div>`;
        }).join('')}
      </div>
    `;

    currentDate.setDate(currentDate.getDate() + 1);
  }

  grid.innerHTML = html;
}

function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  renderCalendar();
  lucide.createIcons();
}

function goToToday() {
  currentMonth = new Date();
  renderCalendar();
  lucide.createIcons();
}

// ── RENDER LIST ──
function renderList() {
  const container = document.getElementById('event-list');
  if (filteredEvents.length === 0) return;

  let html = '';
  filteredEvents.forEach(evento => {
    const date = evento.data_inicio?.toDate ? evento.data_inicio.toDate() : new Date(evento.data_inicio);
    const day = date.getDate();
    const monthShort = date.toLocaleDateString('pt-BR', { month: 'short' }).toUpperCase();
    const tipoClass = `tipo-${evento.tipo?.toLowerCase() || 'comercial'}`;

    html += `
      <div class="event-card">
        <div class="event-date-badge">
          <div class="event-date-day">${day}</div>
          <div class="event-date-month">${monthShort}</div>
        </div>
        <div class="event-content">
          <div class="event-header">
            <div>
              <div class="event-title">${evento.titulo}</div>
              ${evento.cliente ? `<div style="font-size: 0.85rem; color: var(--muted); margin-top: 4px;">
                ${evento.cliente}
              </div>` : ''}
            </div>
            <span class="event-tipo-badge ${tipoClass}">${evento.tipo || 'Comercial'}</span>
          </div>
          <div class="event-meta">
            ${evento.local ? `<div class="event-meta-item">
              <i data-lucide="map-pin"></i>
              ${evento.local}, ${evento.cidade || ''}
            </div>` : ''}
            ${evento.publico_esperado ? `<div class="event-meta-item">
              <i data-lucide="users"></i>
              ${evento.publico_esperado} pessoas
            </div>` : ''}
            ${evento.status ? `<div class="event-meta-item">
              <i data-lucide="check-circle"></i>
              ${evento.status}
            </div>` : ''}
          </div>
          ${evento.descricao ? `<div class="event-description">${evento.descricao}</div>` : ''}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

// ── INITIALIZE ──
document.addEventListener('DOMContentLoaded', () => {
  loadEventos();
  lucide.createIcons();
});
</script>

</body>
</html>
